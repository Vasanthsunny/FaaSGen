apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: log-f1-batch
  namespace: default
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
    spec:
      containerConcurrency: 1
      containers:
        - image: 172.0.0.0:5000/log-f1-batch:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: F2_URL
              value: "http://log-f2-shard.default.svc.cluster.local/"
            - name: REDIS_HOST
              value: "redis.default.svc.cluster.local"
          resources:
            limits:
              cpu: "1"
              memory: "512Mi"
            requests:
              cpu: "250m"
              memory: "256Mi"

---
