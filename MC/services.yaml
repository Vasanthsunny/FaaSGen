          ports:
            - containerPort: 8080
          env:
            - name: F4_URL
              value: "http://mc-f4-aggregate.default.svc.cluster.local/"
            - name: REDIS_HOST
              value: "redis.default.svc.cluster.local"
          resources:
            limits:
              cpu: "500m"
              memory: "256Mi"
            requests:
              cpu: "200m"
              memory: "128Mi"
---
