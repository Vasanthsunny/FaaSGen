metadata:
  name: mc-f3-worker
  namespace: default
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "20"
    spec:
      containerConcurrency: 1
      containers:
        - image: 172.0.0.0:5000/mc-f3-worker:latest
